# This config works with both:
# - prek (recommended): https://github.com/j178/prek
# - pre-commit: https://pre-commit.com/

minimum_pre_commit_version: "3.6.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyrefly-type-check
        name: pyrefly type check
        entry: pyrefly check
        language: python
        additional_dependencies: [pyrefly==0.54.0]
        always_run: true
        pass_filenames: false
        types_or: [python, pyi]
