name: Feature request
description: Propose an enhancement to calmplots
title: "feature: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Help us understand the use case and impact.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve?
      placeholder: I want to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred API, behavior, or workflow.
      placeholder: It would be great if calmplots could...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional; share any workaround or alternative design.

  - type: textarea
    id: scope
    attributes:
      label: Scope and affected backends
      description: Note which backends this impacts (matplotlib, seaborn, plotnine, plotly, altair).
      placeholder: matplotlib + seaborn

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
