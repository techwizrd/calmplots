name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync test dependencies
        run: uv sync --extra test --extra all

      - name: Run tests
        run: uv run pytest

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: uv run pytest --cov=calmplots --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  quality:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Sync quality dependencies
        run: uv sync --extra test --extra docs --extra all

      - name: Run type checks
        run: uv run pyrefly check

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Build docs
        run: uv run sphinx-build -b html docs/source docs/_build/html

      - name: Build sdist and wheel
        run: uv run python -m build

  package-smoke:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          uv sync --extra test
          uv run python -m build --wheel

      - name: Install built wheel with extras and run quickstart smoke
        run: |
          python3 -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          WHEEL_PATH=$(ls dist/*.whl)
          WHEEL_URL="file://$(pwd)/${WHEEL_PATH}"
          python -m pip install "calmplots[all] @ ${WHEEL_URL}"
          python - <<'PY'
          import calmplots

          calmplots.apply_matplotlib_theme()
          calmplots.set_seaborn_theme(context="notebook")
          calmplots.register_plotly_template(set_default=True)
          calmplots.enable_altair_theme()
          print(calmplots.__version__)
          PY
