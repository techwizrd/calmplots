name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync test dependencies
        run: uv sync --extra test --extra all

      - name: Run tests
        run: uv run pytest

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: uv run pytest --cov=calmplots --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  quality:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Sync quality dependencies
        run: uv sync --extra test --extra docs --extra all

      - name: Run type checks
        run: uv run pyrefly check

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Build docs
        run: uv run sphinx-build -b html docs/source docs/_build/html

      - name: Build sdist and wheel
        run: uv run python -m build
