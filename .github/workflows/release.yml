name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          uv sync --extra test
          uv run python -m build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-artifacts
          path: dist/*

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*

  install-smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist-artifacts
          path: dist

      - name: Install wheel and run quickstart smoke
        run: |
          python3 -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          WHEEL_PATH=$(ls dist/*.whl)
          WHEEL_URL="file://$(pwd)/${WHEEL_PATH}"
          python -m pip install "calmplots[all] @ ${WHEEL_URL}"
          python - <<'PY'
          import calmplots

          calmplots.apply_matplotlib_theme()
          calmplots.set_seaborn_theme(context="notebook")
          calmplots.register_plotly_template(set_default=True)
          calmplots.enable_altair_theme()
          print(calmplots.__version__)
          PY

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: install-smoke
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/calmplots
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist-artifacts
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    runs-on: ubuntu-latest
    needs: publish-testpypi
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/calmplots
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist-artifacts
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
